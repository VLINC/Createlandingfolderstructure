<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>VLINC</title>
    <meta name="description" content="VLINC — coming soon." />

    <!-- ✅ Favicon for Pro Clean logo -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <style>
      :root{
        --bg:#0b1020;
        --card:rgba(255,255,255,.06);
        --border:rgba(255,255,255,.14);
        --text:rgba(255,255,255,.92);
        --muted:rgba(255,255,255,.75);
        --brand:#4f7cff;
      }
      *{box-sizing:border-box}
      body{
        margin:0;
        font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
        background:
          radial-gradient(1200px 600px at 20% 10%, rgba(79,124,255,.25), transparent 55%),
          radial-gradient(900px 500px at 80% 30%, rgba(0,255,209,.10), transparent 60%),
          var(--bg);
        color:var(--text);
      }
      .wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:56px 20px;}
      .card{
        width:min(920px, 100%);
        background:var(--card);
        border:1px solid var(--border);
        border-radius:18px;
        padding:38px;
        backdrop-filter: blur(10px);
      }
      .top{display:flex; gap:18px; align-items:center; justify-content:space-between; flex-wrap:wrap;}
      .logo{
        display:inline-flex; align-items:center; gap:10px; font-weight:800; letter-spacing:.5px;
      }
      .dot{width:10px; height:10px; border-radius:999px; background:var(--brand); box-shadow:0 0 18px rgba(79,124,255,.9);}
      h1{margin:18px 0 10px; font-size:44px; line-height:1.05;}
      p{margin:0; color:var(--muted); font-size:18px; line-height:1.55;}
      .row{display:flex; gap:12px; flex-wrap:wrap; margin-top:20px;}
      input{
        flex:1; min-width:240px;
        padding:14px 12px;
        border-radius:12px;
        border:1px solid rgba(255,255,255,.18);
        background:rgba(0,0,0,.25);
        color:var(--text);
        outline:none;
      }
      button{
        padding:14px 16px;
        border-radius:12px;
        border:0;
        background:var(--brand);
        color:white;
        font-weight:800;
        cursor:pointer;
      }
      button:active{transform: translateY(1px);}
      .small{margin-top:14px; font-size:13px; color:rgba(255,255,255,.65);}
      .pill{
        font-size:12px;
        padding:7px 10px;
        border-radius:999px;
        border:1px solid rgba(255,255,255,.16);
        color:rgba(255,255,255,.8);
      }

      /* Footer styles */
      footer.site-footer { margin-top:24px; }
      footer .footer-inner {
        text-align:center;
        padding:18px 24px;
        border-top:1px solid var(--border);
        color:var(--muted);
        font-size:13px;
        border-radius:0 0 18px 18px;
      }
      footer .footer-inner a { color:var(--muted); text-decoration:underline; margin:0 8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="card">
        <div class="top">
          <div class="logo"><span class="dot"></span> VLINC</div>
          <div class="pill">Coming soon</div>
        </div>

        <h1>One link. Better connections.</h1>
        <p>
          VLINC is building a simple, modern way to share and manage your presence online.
          Join the waitlist to be first in line.
        </p>

        <form class="row" onsubmit="return handleSubmit(event)">
          <input id="email" type="email" required placeholder="you@example.com" autocomplete="email" />
          <button type="submit">Join waitlist</button>
        </form>

        <div id="status" class="small"></div>
        <div class="small">Deployed: 2026-03-02 • Firebase Hosting</div>
      </main>
    </div>

    <!-- Footer with links to static policy pages -->
    <footer class="site-footer" aria-label="Site footer">
      <div class="footer-inner">
        <a href="/terms.html" target="_blank" rel="noopener">Terms of Service</a> |
        <a href="/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>
        <div style="margin-top:8px;">© <span id="year"></span> VLINC</div>
      </div>
    </footer>

    <script>
      function handleSubmit(e){
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const status = document.getElementById('status');
        status.textContent = email ? ("Thanks — we’ll notify you at " + email + ".") : "Thanks!";
        return false;
      }

      // set automatic year for footer
      try {
        document.getElementById('year').textContent = new Date().getFullYear();
      } catch(e){}
    </script>
  </body>
</html>
